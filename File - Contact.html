<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nandera Gloria - Contact</title>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Outfit', sans-serif; background: #0f172a; color: #e2e8f0; padding: 30px 20px; }
    .container { max-width: 850px; margin: 0 auto; }
    .card { background: #1e293b; border-radius: 18px; padding: 30px; margin-bottom: 25px; border: 1px solid #334155; box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
    h2 { font-size: 24px; color: #f8fafc; margin-bottom: 15px; border-left: 4px solid #6366f1; padding-left: 12px; }
    label { display: block; margin-bottom: 8px; font-weight: 600; color: #f8fafc; }
    input, textarea { width: 100%; padding: 14px 16px; background: #334155; border: 2px solid #475569; border-radius: 12px; color: #f8fafc; font-family: 'Outfit', sans-serif; font-size: 15px; margin-bottom: 18px; }
    input:focus, textarea:focus { outline: none; border-color: #6366f1; box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2); }
    input[type="submit"] { background: linear-gradient(90deg, #6366f1, #8b5cf6); color: white; padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; width: 100%; }
    input[type="submit"]:hover { opacity: 0.9; }
    a { color: #60a5fa; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .contact-info { text-align: center; margin-top: 15px; }
    .contact-info a { display: block; margin: 8px 0; }
    nav { text-align: center; margin-bottom: 25px; }
    nav a { margin: 0 12px; color: #60a5fa; text-decoration: none; font-weight: 600; }
    nav a:hover { text-decoration: underline; }
    footer { text-align: center; color: #94a3b8; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <nav>
        <a href="index.html">Personal Profile</a> | 
        <a href="hobbies.html">My Hobbies</a> | 
        <a href="education.html">Education</a> | 
        <a href="contact.html">Contact Me</a>
    </nav>
    
    <div class="card">
        <h2>Contact Me</h2>
        <form>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
            
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            
            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="5" required></textarea>
            
            <input type="submit" value="Send Message">
        </form>
        
        <div class="contact-info">
            <p>Email: <a href="mailto:glorianandera72@gmail.com">glorianandera72@gmail.com</a></p>
            <p>WhatsApp: <a href="https://wa.me/your-number">Chat with me</a></p>
        </div>
    </div>
    
    <footer>
        <p>Nandera Gloria &copy; 2026</p>
    </footer>
</div>
</body>
</html>
